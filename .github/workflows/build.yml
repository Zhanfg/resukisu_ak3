name: Build ReSukiSU Kernel

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y git build-essential bc flex bison libssl-dev \
          gcc-aarch64-linux-gnu g++-aarch64-linux-gnu clang zip unzip

    - name: Clone kernel source
      run: |
        git clone https://github.com/crdroidandroid/android_kernel_oneplus_sdm845 -b lineage-20 kernel

    - name: Clone ReSukiSU
      run: |
        git clone https://github.com/ReSukiSU/ReSukiSU resukisu

    - name: Generate ReSukiSU patch
      run: |
        cd kernel
        # 将 ReSukiSU 的内核代码复制到源码（示例路径，需根据实际调整）
        cp -r ../resukisu/kernel/* ./ 
        # 生成 patch 文件
        git diff > ../resukisu.patch

    - name: Apply ReSukiSU patch
      run: |
        cd kernel
        git apply ../resukisu.patch

    - name: Build kernel
      run: |
        cd kernel
        make O=out ARCH=arm64 sdm845_defconfig
        make -j$(nproc) O=out ARCH=arm64 \
          CROSS_COMPILE=aarch64-linux-gnu- \
          CC=clang

    - name: Clone AnyKernel3
      run: |
        git clone https://github.com/osm0sis/AnyKernel3 ak3

    - name: Package with AnyKernel3
      run: |
        cp kernel/out/arch/arm64/boot/Image.gz-dtb ak3/
        cd ak3
        zip -r9 ../ReSukiSU-ak3.zip *

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ReSukiSU-ak3
        path: ReSukiSU-ak3.zip
